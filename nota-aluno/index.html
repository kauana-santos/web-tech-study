<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="container">
        <form>
            <article class="form-control">
                <label for="nome">Digite o nome do aluno</label>
                <input type="text" min="0" id="nome">
            </article>
            <article class="form-control">
                <label for="nota">Digite nota do aluno</label>
                <input type="number" min="0" id="nota">
            </article>

            <section id="message">
                <span>Digite a nota</span>
            </section>

            <button id="verifica-nota" onclick="resultadoNotaClick(event)">Verificar nota</button>

            <div id="resultado">
                
            </div>
        </form>
    </main>
    <script src="./js/script.js" defer></script>
</body>

</html>
